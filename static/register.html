<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Codex Test</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>

<body>
    <div class="orb orb-1" style="position:fixed;z-index:0;"></div>
    <div class="orb orb-2" style="position:fixed;z-index:0;"></div>
    <div class="grid-overlay"
        style="position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);background-size:60px 60px;">
    </div>
    <div id="toast-container"></div>

    <div class="auth-page">
        <div class="glass-card auth-card">
            <div class="auth-logo">
                <div class="auth-logo-text">CODEX TEST</div>
                <div class="auth-logo-sub">Create Your Account</div>
            </div>
            <h2 class="auth-title">Join the Platform</h2>
            <p class="auth-sub">Register to start coding</p>

            <div id="error-msg" class="alert alert-error" style="display:none;"></div>

            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required>
                </div>

                <div class="form-group">
                    <label>Select Role</label>
                    <div class="role-selector">
                        <input type="radio" name="role" id="role-student" value="student" class="role-option" checked>
                        <label for="role-student" class="role-label">
                            <span class="role-icon">👨‍💻</span>
                            <span>Student</span>
                        </label>
                        <input type="radio" name="role" id="role-master" value="master" class="role-option">
                        <label for="role-master" class="role-label">
                            <span class="role-icon">🛡️</span>
                            <span>Admin (Master)</span>
                        </label>
                    </div>
                </div>

                <div class="form-group" id="department-group" style="display:none;">
                    <label>🏫 Department</label>
                    <select id="department" class="form-control">
                        <option value="">-- Select Department --</option>
                        <option value="AI&DS">AI&DS</option>
                        <option value="CSE">CSE</option>
                        <option value="CYBER">CYBER</option>
                        <option value="CSBS">CSBS</option>
                        <option value="IT">IT</option>
                        <option value="AI&ML">AI&ML</option>
                    </select>
                </div>

                <div class="form-group" id="master-key-group" style="display:none;">
                    <label>🔑 Master Key</label>
                    <input type="password" id="master-key" class="form-control" placeholder="Enter admin master key">
                    <small style="color:var(--text-muted,#888);font-size:0.78rem;margin-top:4px;display:block;">Required
                        for Admin registration only.</small>
                </div>

                <button type="submit" class="btn btn-primary" id="reg-btn" style="width:100%;justify-content:center;">
                    Create Account
                </button>
            </form>

            <div class="auth-link">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        const token = localStorage.getItem('terv_token');
        const user = JSON.parse(localStorage.getItem('terv_user') || 'null');
        if (token && user) {
            window.location.href = user.role === 'master' ? '/admin/dashboard' : '/student/dashboard';
        }

        // Show/hide master key field based on role selection
        document.querySelectorAll('input[name="role"]').forEach(radio => {
            radio.addEventListener('change', () => {
                const masterKeyGroup = document.getElementById('master-key-group');
                const masterKeyInput = document.getElementById('master-key');
                const departmentGroup = document.getElementById('department-group');
                const departmentSelect = document.getElementById('department');
                if (radio.value === 'master' && radio.checked) {
                    masterKeyGroup.style.display = 'block';
                    masterKeyInput.required = true;
                    departmentGroup.style.display = 'none';
                    departmentSelect.required = false;
                    departmentSelect.value = '';
                } else if (radio.value === 'student' && radio.checked) {
                    masterKeyGroup.style.display = 'none';
                    masterKeyInput.required = false;
                    masterKeyInput.value = '';
                    departmentGroup.style.display = 'block';
                    departmentSelect.required = true;
                }
            });
        });

        // Show department by default (student is default role)
        document.getElementById('department-group').style.display = 'block';
        document.getElementById('department').required = true;

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating…';
            const err = document.getElementById('error-msg'); err.style.display = 'none';
            const role = document.querySelector('input[name="role"]:checked').value;
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role
            };
            if (role === 'master') {
                payload.master_key = document.getElementById('master-key').value;
            }
            if (role === 'student') {
                payload.department = document.getElementById('department').value;
            }
            try {
                const data = await API.post('/api/auth/register', payload);
                localStorage.setItem('terv_token', data.token);
                localStorage.setItem('terv_user', JSON.stringify(data.user));
                window.location.href = data.user.role === 'master' ? '/admin/dashboard' : '/student/dashboard';
            } catch (ex) {
                err.textContent = ex.message || 'Registration failed';
                err.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        });
    </script>
</body>

</html>
